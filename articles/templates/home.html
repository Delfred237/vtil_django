{% load static tailwind_tags %}
<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}" /> -->
    {% tailwind_css %}
  </head>
  <body>
    <header
      class="flex items-center justify-between px-10 py-5 bg-[#fcfcfc] shadow-md fixed w-full top-0 left-0 z-100"
    >
      <h1 class="text-4xl font-bold text-blue-400"><a href="#">Django</a></h1>
      <nav class="flex items-center gap-8">
        <ul class="flex items-center gap-8">
          <li>
            <a class="text-[18px] text-gray-500 hover:text-blue-400" href="#"
              >Home</a
            >
          </li>
          <li>
            <a class="text-[18px] text-gray-500 hover:text-blue-400" href="#"
              >About</a
            >
          </li>
          <li>
            <a class="text-[18px] text-gray-500 hover:text-blue-400" href="#"
              >Services</a
            >
          </li>
          <li>
            <a class="text-[18px] text-gray-500 hover:text-blue-400" href="#"
              >Contact</a
            >
          </li>
        </ul>
        <div id="shopping-bag" class="relative cursor-pointer">
          <svg
            xmlns="http://w3.org"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
          <span
            class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 flex justify-center items-center text-white text-xs rounded-full"
            >0</span
          >
        </div>

        <a
          href="#"
          class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600"
          >Login</a
        >
      </nav>
    </header>

    <section
      class="h-screen w-full bg-linear-to-bl from-blue-400 to-purple-500 flex items-center justify-center"
    >
      <div class="container mx-auto h-full flex items-center justify-center">
        <div class="text-center text-white">
          <h1 class="text-5xl font-bold mb-4">Welcome to Django</h1>
          <p class="text-lg mb-8">
            Build powerful web applications with Django
          </p>
          <a
            href="#"
            id="clickButton"
            class="bg-blue-500 text-white px-6 py-3 rounded-md hover:bg-blue-600"
            >Get Started</a
          >
        </div>
      </div>
    </section>
    <section
      id="modal"
      class="absolute top-0 left-0 w-full h-screen bg-black/80 hidden justify-center items-center z-120"
    >
      <div class="text-center text-white">
        <h2 class="text-3xl font-bold mb-4">Not products yet</h2>
        <p class="mb-8" class="text-lg mb-8">Check back later</p>
        <a
          href="#"
          id="modal-button"
          class="bg-blue-500 text-white px-6 py-3 rounded-md hover:bg-blue-600"
          >Go Home</a
        >
      </div>
    </section>

    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
